<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Room — pictionAIRy</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/javascript/common.js" defer></script>
    <script src="/javascript/join-room.js" defer></script>
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <a class="app-header__back" href="/">← Home</a>
            <a class="app-header__brand" href="/">piction<span>AIRy</span></a>
        </header>

        <main class="app-main">
            <section class="page-card">
                <h1 class="page-title">Join a Room</h1>
                <p class="page-subtitle page-subtitle--compact">
                    Enter the room code shared by the host to jump into the game.
                </p>

                <form id="join-room-form" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="display-name">Your display name</label>
                        <input
                            class="form-input"
                            type="text"
                            id="display-name"
                            name="displayName"
                            placeholder="Enter your name"
                            autocomplete="nickname"
                            maxlength="24"
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="room-code">Room code</label>
                        <input
                            class="form-input form-input--code"
                            type="text"
                            id="room-code"
                            name="roomCode"
                            placeholder="ABC123"
                            autocomplete="off"
                            maxlength="6"
                            inputmode="text"
                        >
                        <p class="form-hint">Codes are six characters, letters and numbers.</p>
                    </div>

                    <div class="info-panel">
                        <p class="info-panel__title">Coming soon</p>
                        <p class="info-panel__text">
                            Room lookup and player joining will be connected to the server here.
                        </p>
                    </div>

                    <div class="form-actions">
                        <button class="btn btn--primary" type="submit">Join Room</button>
                        <a class="btn btn--secondary" href="/">Cancel</a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
