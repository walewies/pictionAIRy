<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pictionAIRy</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/javascript/common.js" defer></script>
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <a class="app-header__brand" href="index.html">piction<span>AIRy</span></a>
        </header>

        <main class="app-main">
            <section class="page-card page-card--home">
                <div class="logo-mark" aria-hidden="true">🎨</div>
                <h1 class="page-title">Draw in the air</h1>
                <p class="page-subtitle">Create a room for friends or join one that is already open.</p>

                <div class="action-list">
                    <a class="btn btn--primary" href="/create-room">Create Room</a>
                    <a class="btn btn--secondary" href="/join-room">Join Room</a>
                </div>
            </section>
        </main>
    </div>

</html>
